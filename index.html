<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IH.WH | إدارة المخازن</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --diesel-blue: #1a2a33;
            --diesel-dark: #0f191f;
            --elite-gold: #D4AF37;
            --text-light: #e0e0e0;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--diesel-dark);
            color: var(--text-light);
            margin: 0;
            padding-bottom: 80px;
        }

        /* Header & Search */
        header {
            background: var(--diesel-blue);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--elite-gold);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--elite-gold);
            display: block;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .search-container input {
            width: 90%;
            max-width: 500px;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid var(--elite-gold);
            background: var(--diesel-dark);
            color: white;
            text-align: center;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(26, 42, 51, 0.8);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-weight: 600;
        }

        /* Grid System */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .product-card {
            background: var(--diesel-blue);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .product-card:hover {
            border-color: var(--elite-gold);
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            background: #000;
        }

        .stock-badge {
            background: var(--elite-gold);
            color: var(--diesel-dark);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .low-stock { background: var(--danger); color: white; }

        /* Bottom Bar */
        .cart-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--diesel-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-top: 2px solid var(--elite-gold);
            box-sizing: border-box;
        }

        .checkout-btn {
            background: var(--elite-gold);
            color: var(--diesel-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
        }

        .modal-content-form {
            background: white;
            margin: 5% auto;
            width: 90%;
            max-width: 600px;
            height: 80vh;
            border-radius: 15px;
            overflow: hidden;
        }

        .close-modal { color: white; font-size: 30px; position: absolute; top: 10px; right: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <span class="logo">IH.WH <i class="fas fa-warehouse"></i> المستودع</span>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن مادة..." onkeyup="filterProducts()">
        </div>
    </header>

    <div class="stats-bar">
        <div>المواد: <span id="total-count">0</span></div>
        <div>نقص: <span id="low-count" style="color:var(--danger)">0</span></div>
    </div>

    <div id="status-msg" style="text-align:center; padding:50px; color:var(--elite-gold);">
        جاري تحميل البيانات...
    </div>

    <div class="grid-container" id="main-grid"></div>

    <div class="cart-bar">
        <div><i class="fas fa-sync-alt"></i> تحديث تلقائي متصل</div>
        <button class="checkout-btn" onclick="openForm()">تحديث المخزون <i class="fas fa-plus"></i></button>
    </div>

    <!-- Form Modal -->
    <div id="formModal" class="modal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content-form">
             <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdA_Vwnl8VxE0qxuqDmAuH0N2Ly8qQ939CbS20AOn9Jbo6Zkw/viewform?embedded=true" 
                     width="100%" height="100%" frameborder="0">جاري التحميل...</iframe>
        </div>
    </div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
        let allProducts = [];

        async function fetchData() {
            try {
                const response = await fetch(scriptURL);
                allProducts = await response.json();
                renderProducts(allProducts);
                document.getElementById('status-msg').style.display = 'none';
            } catch (error) {
                document.getElementById('status-msg').innerHTML = "خطأ في الاتصال بالقاعدة";
            }
        }

        function renderProducts(products) {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            let lowStock = 0;

            products.forEach(item => {
                const isLow = item.Stock < 5; // Example threshold
                if(isLow) lowStock++;

                grid.innerHTML += `
                    <div class="product-card">
                        <img src="${item.Image || 'https://via.placeholder.com/150'}" alt="${item.Name}">
                        <div style="font-weight:600; margin-bottom:5px;">${item.Name}</div>
                        <div class="stock-badge ${isLow ? 'low-stock' : ''}">
                            الكمية: ${item.Stock}
                        </div>
                        <div style="font-size:0.7rem; margin-top:5px; opacity:0.7;">SKU: ${item.ID}</div>
                    </div>
                `;
            });

            document.getElementById('total-count').innerText = products.length;
            document.getElementById('low-count').innerText = lowStock;
        }

        function filterProducts() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.Name.toLowerCase().includes(query) || 
                p.ID.toString().toLowerCase().includes(query)
            );
            renderProducts(filtered);
        }

        function openForm() { document.getElementById('formModal').style.display = 'block'; }
        function closeModal() { document.getElementById('formModal').style.display = 'none'; fetchData(); }

        // Initial Load
        fetchData();
        
        // Refresh data every 2 minutes automatically
        setInterval(fetchData, 120000);
    </script>
</body>
</html>
