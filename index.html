<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>انبار امام حسن (ع)</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2e7d32;
            --bg: #f8faf9;
            --card-bg: #ffffff;
            --text-main: #1a2e1b;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header & Search --- */
        header {
            background: linear-gradient(135deg, var(--primary), #1b5e20);
            padding: 20px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .search-box input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
        }

        /* --- Dynamic Filters --- */
        .filter-bar {
            display: flex;
            padding: 15px;
            gap: 10px;
            overflow-x: auto;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .pill {
            padding: 6px 18px;
            border-radius: 20px;
            background: #f0f0f0;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .pill.active { background: var(--primary); color: white; }

        /* --- Grid & Cards --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 10px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; cursor: pointer; }

        /* --- SLIDE PANEL (The "Easy Swap" Feature) --- */
        #formPanel {
            position: fixed;
            top: 0;
            right: -100%; /* Hidden by default */
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: white;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: -10px 0 30px rgba(0,0,0,0.2);
        }

        #formPanel.open { right: 0; }

        .panel-header {
            background: var(--primary);
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- Floating Action Button --- */
        .fab {
            position: fixed;
            bottom: 30px;
            left: 30px; /* Opposite side for easy thumb access */
            width: 65px;
            height: 65px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.4);
            cursor: pointer;
            z-index: 1500;
            transition: transform 0.3s;
        }

        .fab:active { transform: scale(0.9); }

        iframe { width: 100%; height: calc(100% - 60px); border: none; }
    </style>
</head>
<body>

    <header>
        <div style="text-align:center; font-weight:900; margin-bottom:10px;">انبار امام حسن (ع)</div>
        <div class="search-box">
            <input type="text" id="search" placeholder="ابحث هنا..." onkeyup="runFilter()">
        </div>
    </header>

    <div class="filter-bar" id="filters"></div>

    <div class="grid" id="grid"></div>

    <!-- The Slide Panel -->
    <div id="formPanel">
        <div class="panel-header">
            <span>تحديث سريع للمخزون</span>
            <i class="fas fa-times" style="cursor:pointer; font-size:20px;" onclick="togglePanel(false)"></i>
        </div>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSdA_Vwnl8VxE0qxuqDmAuH0N2Ly8qQ939CbS20AOn9Jbo6Zkw/viewform?embedded=true"></iframe>
    </div>

    <!-- Quick Entry Button -->
    <div class="fab" onclick="togglePanel(true)">
        <i class="fas fa-plus"></i>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwO5yggb7xo6jOnlWd0uf7W91IqAaYeyDZ1lGRhHyR1g0W7z8MBx-b1Ta0Ooc4xYQF5/exec';
        let data = [];
        let currentType = null;

        async function load() {
            const res = await fetch(scriptURL);
            data = await res.json();
            render();
        }

        function render() {
            const fContainer = document.getElementById('filters');
            const gContainer = document.getElementById('grid');
            const types = [...new Set(data.map(i => i.type))];

            // Render Pills
            fContainer.innerHTML = `<div class="pill ${!currentType?'active':''}" onclick="setType(null)">الكل</div>` + 
                types.map(t => `<div class="pill ${currentType===t?'active':''}" onclick="setType('${t}')">${t}</div>`).join('');

            // Render Items
            const filtered = data.filter(i => 
                (!currentType || i.type === currentType) &&
                (i.item || "").toLowerCase().includes(document.getElementById('search').value.toLowerCase())
            );

            gContainer.innerHTML = filtered.map(row => `
                <div class="card">
                    <img src="${row.IMAGE || 'https://via.placeholder.com/150'}">
                    <div style="font-weight:800; margin:8px 0 4px;">${row.item}</div>
                    <div style="color:var(--primary); font-weight:700; font-size:0.9rem;">${row.quantity} ${row.Unit || ''}</div>
                    <div style="font-size:0.7rem; color:#999; margin-top:5px;">${row.placement || 'WH'}</div>
                </div>
            `).join('');
        }

        function setType(t) { currentType = t; render(); }
        function runFilter() { render(); }

        function togglePanel(show) {
            document.getElementById('formPanel').classList.toggle('open', show);
            if(!show) load(); // Refresh data when closing
        }

        load();
    </script>
</body>
</html>
